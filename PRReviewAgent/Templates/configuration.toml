# Important: This file contains all available configuration options.
# Do not copy this entire file to your repository configuration.
# Your repository configuration should only include options you wish to override from the defaults.
#
# Use this page: 'https://qodo-merge-docs.qodo.ai/ai_search/' to ask questions about the configuration options.

[config]
# models
model="gpt-5.2-2025-12-11"
fallback_models=["o4-mini"]
#model_reasoning="o4-mini" # dedicated reasoning model for self-reflection
#model_weak="gpt-4o" # optional, a weaker model to use for some easier tasks
# CLI
git_provider="gitlab"
publish_output=true
publish_output_progress=true
verbosity_level=0 # 0,1,2
use_extra_bad_extensions=false
# Log
log_level="DEBUG"
# Configurations
use_wiki_settings_file=true
use_repo_settings_file=true
use_global_settings_file=true
disable_auto_feedback = false
ai_timeout=120 # 2minutes
skip_keys = []
custom_reasoning_model = false # when true, disables system messages and temperature controls for models that don't support chat-style inputs
response_language="ja-JP" #en-US" # Language locales code for PR responses in ISO 3166 and ISO 639 format (e.g., "en-US", "it-IT", "zh-CN", ...)
# token limits
max_description_tokens = 500
max_commits_tokens = 500
max_model_tokens = 32000 # Limits the maximum number of tokens that can be used by any model, regardless of the model's default capabilities.
custom_model_max_tokens=32000 # for models not in the default list
model_token_count_estimate_factor=0.3 # factor to increase the token count estimate, in order to reduce likelihood of model failure due to too many tokens - applicable only when requesting an accurate estimate.
# patch extension logic
patch_extension_skip_types =[".md",".txt"]
allow_dynamic_context=true
max_extra_lines_before_dynamic_context = 10 # will try to include up to 10 extra lines before the hunk in the patch, until we reach an enclosing function or class
patch_extra_lines_before = 5 # Number of extra lines (+3 default ones) to include before each hunk in the patch
patch_extra_lines_after = 1 # Number of extra lines (+3 default ones) to include after each hunk in the patch
secret_provider="" # "" (disabled), "google_cloud_storage", or "aws_secrets_manager" for secure secret management
cli_mode=false
ai_disclaimer_title=""  # Pro feature, title for a collapsible disclaimer to AI outputs
ai_disclaimer=""  # Pro feature, full text for the AI disclaimer
output_relevant_configurations=false
large_patch_policy = "clip" # "clip", "skip"
duplicate_prompt_examples = false
# seed
seed=-1 # set positive value to fix the seed (and ensure temperature=0)
temperature=0.1
# bring repo metadata 💎
add_repo_metadata=false # if true, will try to add metadata from files like 'AGENTS.MD', 'CLAUDE.MD', 'QODO.MD'
add_repo_metadata_file_list =["AGENTS.MD", "CLAUDE.MD", "QODO.MD"]
# ignore logic
ignore_pr_title = ["^\\[Auto\\]", "^Auto"] # a list of regular expressions to match against the PR title to ignore the PR agent
ignore_pr_target_branches = [] # a list of regular expressions of target branches to ignore from PR agent when an PR is created
ignore_pr_source_branches = [] # a list of regular expressions of source branches to ignore from PR agent when an PR is created
ignore_pr_labels = [] # labels to ignore from PR agent when an PR is created
ignore_pr_authors = [] # authors to ignore from PR agent when an PR is created
ignore_repositories = [] # a list of regular expressions of repository full names (e.g. "org/repo") to ignore from PR agent processing
ignore_language_framework = [] # a list of code-generation languages or frameworks (e.g. 'protobuf', 'go_gen') whose auto-generated source files will be excluded from analysis
#
is_auto_command = false # will be auto-set to true if the command is triggered by an automation
enable_ai_metadata = false # will enable adding ai metadata
reasoning_effort = "medium" # "low", "medium", "high"
# auto approval 💎
enable_auto_approval=false # Set to true to enable auto-approval of PRs under certain conditions
auto_approve_for_low_review_effort=-1 # -1 to disable, [1-5] to set the threshold for auto-approval
auto_approve_for_no_suggestions=false # If true, the PR will be auto-approved if there are no suggestions
ensure_ticket_compliance=false # Set to true to disable auto-approval of PRs if the ticket is not compliant
# extended thinking for Claude reasoning models
enable_claude_extended_thinking = false # Set to true to enable extended thinking feature
extended_thinking_budget_tokens = 2048
extended_thinking_max_output_tokens = 4096


[pr_reviewer] # /review #
# enable/disable features
require_score_review=false
require_tests_review=true
require_estimate_effort_to_review=true
require_can_be_split_review=false
require_security_review=true
require_estimate_contribution_time_cost=false
require_todo_scan=false
require_ticket_analysis_review=true
# general options
publish_output_no_suggestions=true # Set to "false" if you only need the reviewer's remarks (not labels, not "security audit", etc.) and want to avoid noisy "No major issues detected" comments.
persistent_comment=true
extra_instructions = """
Please use Japanese in description.
次のガイドラインに従い、プルリクエストを日本語でレビューしてください。
# コードレビューガイドライン

## 1. はじめに

### 1.1 コードレビューの目的

コードレビューは、コードとプロダクトの品質を維持・向上させるための重要なプロセスです。主な目的は以下の通りです。

* **コードベースの健全性の維持・向上:** 時間をかけてコードベース全体の品質を高めます。
* **バグの早期発見:** 実装段階での誤りや潜在的な問題点を特定します。
* **知識共有と学習:** チームメンバー間での知識共有を促進し、開発者のスキルアップを図ります。
* **コードの一貫性確保:** プロジェクト全体のコーディングスタイルや設計原則の一貫性を保ちます。
* **保守性と可読性の向上:** 将来の変更やデバッグを容易にする、理解しやすいコードを作成します。

### 1.2 コードレビューの基本原則

* **継続的な改善を重視する:** 完璧さではなく、コードベース全体の健全性を**継続的に改善**することを目指します。CL（Change List / プルリクエスト）がシステム全体の健全性を向上させるなら、積極的に承認します。逆に、健全性を悪化させるCLは、緊急時を除き承認すべきではありません。
* **コミュニケーションを重視する:** コードは他の開発者や将来の自分自身へのコミュニケーション手段です。明確で理解しやすいコードを書くことが重要です。
* **敬意を持って行う:** コメントは**コード**に対して行い、**開発者本人**を批判しないようにします。丁寧な言葉遣いを心がけ、提案の「なぜ」を説明します。
* **迅速な応答:** レビュー依頼には可能な限り早く（目安として1営業日以内）応答します。ただし、集中作業中は中断せず、適切なタイミングで行います。
* **「好み」と「良し悪し」を区別する:** フィードバックが客観的な改善提案（良し悪し）なのか、主観的な好みなのかを明確にし、理由を説明します。

## 2. 設計 (Design)

### 2.1 責務と凝集度・結合度

* **単一責任の原則 (SRP):** クラスやメソッドは、一つの明確な責務（役割）を持つべきです。複数の無関係な処理を一つの単位で行わないようにします。
* **高凝集・疎結合:** 関連性の高いコードは近くにまとめ（高凝集）、モジュール間の依存関係は最小限に抑えます（疎結合）。変更が他の部分へ与える影響を少なくします。
* **適切なクラス設計:** 不要なバリューオブジェクトや過度な汎用化を避け、シンプルで目的に合ったクラス設計を行います。
* **継承より委譲を好む:** コードの再利用や拡張性を高めるため、安易な継承よりも委譲（composition）を優先的に検討します。継承はクラス間の強い結合を生みやすく、将来的な変更に弱くなるため、まずは委譲で実現できないかを考えます。
* **結果の局所化:** 変更の影響範囲が限定的になるように、関連性の高いコードがまとめられているか。
* **ロジックとデータの一体化:** データとそのデータを操作するロジックが、同じクラスやモジュール内に適切に配置されているか。
* **関心の分離 (SoC):** 異なる関心事（例: UI、ビジネスロジック、データアクセス）が適切に分離され、それぞれのモジュールが独立して変更・理解できるようになっているか。
* **インターフェースと実装の分離:** 具象クラスに直接依存するのではなく、インターフェースや抽象クラス（あるいはダックタイピング）を通じて依存することで、実装の変更が容易になっているか。
* **再利用性:** モジュール化、コンポーネント化、設定可能性などを通じて、コードが他のコンテキストでも再利用しやすいように設計されているか。

### 2.2 変更容易性と柔軟性

* **変更の予測と隔離:** 将来変更される可能性が高い箇所（外部API連携、ビジネスルールなど）を特定し、変更が容易になるように設計します。
* **オープン/クローズドの原則 (OCP):** ソフトウェアエンティティ（クラス、モジュール、関数など）は、拡張に対して開いており、修正に対して閉じているべきです。既存のコードを変更せずに機能追加ができるか。

### 2.3 シンプルさとYAGNI

* **シンプルさ (KISS):** 必要以上に複雑なコードになっていないか確認します。「複雑」とは、すぐに理解できない、または変更時にバグを生みやすいコードを指します。
* **YAGNI (You Ain't Gonna Need It):** 現時点で必要ない機能や汎用化（オーバーエンジニアリング）は実装しません。将来の問題は、実際に発生してから対処します。

### 2.4 API設計とインターフェース

* **インターフェースの一貫性:** 関連するAPIやメソッド間で、インターフェース（パラメータ、レスポンス形式など）に一貫性があるか確認します。

### 2.5 抽象化

* **適切な抽象化レベル (SLAP):** 同じルーチンやコードブロック内で、抽象レベルが混在していないか確認します。高レベルな処理と低レベルな実装詳細が混在している場合は、ルーチン抽出などでレベルを揃えます。
* **重複ロジックの抽象化:** ロジックが重複している場合は、適切なクラスやメソッドに抽出して共通化します。
* **充足性、完全性、プリミティブ性:** 抽象化のレベルや粒度が適切か。提供されるインターフェースが必要十分（充足性）で、期待される機能を網羅（完全性）し、基本的な操作で構成（プリミティブ性）されているか。

### 2.6 フレームワーク・ライブラリの利用

* **車輪の再発明の回避:** 標準ライブラリ、フレームワーク、または信頼できる既存のライブラリで実現できる機能を、独自に実装していないか。

## 3. コード品質 (Code Quality)

### 3.1 可読性・理解可能性

* **明確さと意図:** コードが読みやすく、開発者の意図が明確に伝わるか確認します。初見の開発者でも理解できるか。
* **構造化プログラミング:** 制御フロー（if, while, caseなど）が単純で理解しやすいか。深いネストは避けます。
  * **ネスト削減:** ガード節、早期リターン、メソッド抽出、ポリモーフィズムなどでネストを浅くする。
* **論理的な順序とグループ化:** ステートメントが論理的な順序で記述され、関連するコードが空白行などで適切にグループ化されているか。
* **コードは設計書:** コード自体が、将来のメンテナーにとって最も信頼できる設計ドキュメントであるという意識で書かれているか。コードから設計意図が読み取れるか。
* **線形原理:** 処理の流れが複雑に分岐したりジャンプしたりせず、上から下へ自然に読み進められるか。状態遷移が複雑すぎないか。
* **明証原理:** コードが一見して正しいと理解でき、ロジックが自明であるか。複雑な部分はコメントやドキュメントで補足されているか。

### 3.2 命名 (Naming)

* **明確で具体的な名前:** 変数、メソッド、クラス、定数などの名前が、その役割や内容を正確かつ明確に伝えているか。曖昧な名前（`data`, `temp`, `flag`など）は避けます。
* **一貫性:** プロジェクト内で命名規則（キャメルケース、スネークケースなど）や用語が一貫しているか。
* **副作用の明示:** 副作用のあるメソッドには動詞を、ないメソッドには名詞を使うなど、メソッドの性質を名前に反映させる。
* **効果と目的:** 名前が、その要素が何をするか（効果）だけでなく、なぜそれをするのか（目的）も伝えているか。
* **驚き最小の原則:** 名前から期待される動作と、実際の動作が一致しているか。誤解を招く名前になっていないか。

### 3.3 コードの重複回避 (DRY - Don't Repeat Yourself)

* **ロジックの重複:** 同じ、または類似したコードが複数の場所に存在しないか確認します。共通化（メソッド抽出、クラス作成、ヘルパー利用など）を検討します。
* **設定や定数の重複:** 設定値や定数が複数の場所で定義されていないか。一元管理されているか。

### 3.4 複雑性 (Complexity)

* **コードの単純さ:** 必要以上に複雑なロジックや制御フローになっていないか。よりシンプルに書けないか検討します。
* **早期最適化の回避:** パフォーマンスチューニングは、計測に基づいて必要な箇所にのみ行います。可読性や保守性を犠牲にする早期最適化は避けます。

### 3.5 マジックナンバー/文字列の回避

* **定数化:** コード中に直接記述された数値や文字列（マジックナンバー、マジックストリング）に意味がある場合、意味のある名前を持つ定数として定義します。

### 3.6 不要なコードの削除

* **未使用コード:** 使用されていない変数、メソッド、クラス、ファイル、設定、インポートなどがないか確認します。
* **デッドコード:** 到達不能なコードや、実行されても意味のないコードがないか確認します。
* **コメントアウトされたコード:** 不要になったコードはコメントアウトせず、バージョン管理システムを信頼して削除します。

### 3.7 コメント (Comments)

* **「なぜ」を説明する:** コメントは、コードが**何をしているか (How)** ではなく、**なぜそうなっているか (Why)** や**意図 (Intent)** を説明するために使います。コードを見ればわかることや個人の感想は書かない。
* **有益なコメント:** 複雑なアルゴリズム、正規表現、ワークアラウンド、設計上の決定事項など、コードだけでは理解が難しい点を補足します。
* **正確性と最新性:** コメントの内容がコードと一致しており、最新の状態に保たれているか確認します。コード変更時にコメントも更新します。
* **自己文書化コード:** コード自体を分かりやすく書くことで、コメントの必要性を減らすことを目指します。

### 3.8 スタイルとフォーマット (Style)

* **一貫性:** プロジェクト全体でコーディングスタイル（インデント、スペース、括弧の位置など）が一貫しているか確認します。
* **視覚的構造:** インデントや空白行が、コードの論理構造を視覚的に分かりやすく表現しているか。
* **Nitpick（細かい指摘）:** スタイルガイドにない純粋なスタイルの好みに関する指摘は、修正を強制せず、「Nit:」などのプレフィックスを付けて提案します。
* **同型原理:** 同じ種類の処理やデータ構造は、一貫したパターンや形式で記述されているか。不必要な例外や特殊ケースが導入されていないか。
* **対称原理:** 対になる操作（例: `open`/`close`, `lock`/`unlock`, `create`/`destroy`）が考慮され、整合性が保たれているか。条件分岐などで、対になるケースが適切に扱われているか。

### 3.9 エラーハンドリングと例外処理

* **適切な例外処理:** 例外を単なる制御フローとして使わず（例: ループ脱出など）、真に例外的な状況で使用します。
* **信頼性 (ロバストネス):** 予期せぬ入力、不正な操作、外部システムの異常などに対して、システムがクラッシュしたり、不正な状態になったりしないように防御されているか。

### 3.10 防御的プログラミング

* **アサーション:** 開発中に、コードが特定の前提条件を満たしていることを表明・検証するためにアサーションを使用します。
* **入力値検証:** ルーチンやメソッドの境界で、受け取ったパラメータが期待される範囲や型であるか検証します。
* **エラー処理戦略:** エラー発生時にプログラムを安全に停止させるか、エラーを通知して処理を継続するかなど、一貫したエラー処理戦略があるか。
* **安全原理:** 「ありえない」と思われるようなエッジケースや潜在的なエラー条件も考慮に入れ、システムが安全に動作するように設計・実装されているか。

### 3.12 パフォーマンス

* **効率的なアルゴリズムとデータ構造:** 処理内容に対して、効率的なアルゴリズムやデータ構造が選択されているか。

## 4. ドキュメンテーション (Documentation)

* **コードの意図の明確化:** コードだけでは理解が難しいロジックや設計判断について、コメントで意図が補足されているか。
* **関連ドキュメントの更新:** コード変更に伴い、関連するドキュメント（README, API仕様書, 設計書など）も更新されているか。
* **ドキュメンテーションの必要性:** 必要なドキュメンテーションが存在しない場合、作成を依頼する。

## 5. 開発プロセス

### 5.1 その他

* **「あとで修正する」の扱い:** 緊急時を除き、「あとで修正する」は原則として認めず、その場で修正するか、具体的なタスク（TODOコメント、チケット起票）として管理する。
